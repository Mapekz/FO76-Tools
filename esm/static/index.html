<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FO76 ESM Browser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Consolas', monospace; background: #1e1e1e; color: #d4d4d4; display: flex; height: 100vh; }
  #left-pane { width: 320px; min-width: 200px; border-right: 1px solid #3c3c3c; overflow-y: auto; padding: 8px; }
  #right-pane { flex: 1; overflow-y: auto; padding: 12px; }
  #resize-handle { width: 4px; cursor: col-resize; background: #3c3c3c; }
  h2 { font-size: 12px; color: #858585; text-transform: uppercase; padding: 4px 0 8px; }
  .group { cursor: pointer; padding: 3px 6px; border-radius: 3px; }
  .group:hover { background: #2a2d2e; }
  .group.active { background: #094771; }
  .group-label { display: flex; justify-content: space-between; }
  .group-sig { color: #4ec9b0; font-weight: bold; }
  .group-count { color: #858585; font-size: 11px; }
  .record-stub { cursor: pointer; padding: 2px 12px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-stub:hover { background: #2a2d2e; }
  .record-stub.active { background: #094771; }
  .load-more { text-align: center; padding: 6px; color: #569cd6; cursor: pointer; font-size: 12px; }
  .load-more:hover { text-decoration: underline; }
  pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; line-height: 1.5; }
  .field-key { color: #9cdcfe; }
  .field-str { color: #ce9178; }
  .field-num { color: #b5cea8; }
  .field-bool { color: #569cd6; }
  .field-null { color: #569cd6; }
  #record-info { margin-bottom: 12px; font-size: 12px; color: #858585; }
  #record-info span { color: #4ec9b0; }
  .error { color: #f44747; }
  .spinner { color: #858585; animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="left-pane">
  <h2>Groups</h2>
  <div id="group-list">Loading&#8230;</div>
  <div id="record-list" style="display:none">
    <div id="back-btn" style="cursor:pointer;padding:4px 6px;color:#569cd6;font-size:12px;" onclick="showGroups()">&#8592; Back to Groups</div>
    <div id="record-items"></div>
  </div>
</div>
<div id="resize-handle"></div>
<div id="right-pane">
  <div id="record-info">Select a record to view its fields.</div>
  <div id="fields-view"></div>
</div>
<script>
const api = (path) => fetch(path).then(r => r.json());

let currentOffset = 0;
let currentSig = '';
const PAGE = 100;

async function loadGroups() {
  const el = document.getElementById('group-list');
  try {
    const groups = await api('/groups');
    el.innerHTML = '';
    groups.forEach(g => {
      const sig = g.label && g.label.kind === 'record_type' && g.label.sig ? g.label.sig : JSON.stringify(g.label);
      const div = document.createElement('div');
      div.className = 'group';
      div.innerHTML = '<div class="group-label"><span class="group-sig">' + sig + '</span><span class="group-count">' + g.child_count + '</span></div>';
      div.onclick = () => loadGroupChildren(sig, g);
      el.appendChild(div);
    });
  } catch(e) { el.innerHTML = '<div class="error">Failed to load groups: ' + e.message + '</div>'; }
}

function showGroups() {
  document.getElementById('group-list').style.display = '';
  document.getElementById('record-list').style.display = 'none';
}

async function loadGroupChildren(sig, group) {
  currentSig = sig;
  currentOffset = 0;
  document.getElementById('group-list').style.display = 'none';
  const rl = document.getElementById('record-list');
  rl.style.display = '';
  const items = document.getElementById('record-items');
  items.innerHTML = '<div style="padding:4px 12px;font-size:11px;color:#858585">' + sig + ' (' + group.child_count + ')</div>';
  await appendRecords(items, sig);
}

async function appendRecords(container, sig) {
  try {
    const children = await api('/groups/' + sig + '/children?offset=' + currentOffset + '&limit=' + PAGE);
    children.forEach(c => {
      if (c.node === 'record') {
        const r = c;
        const div = document.createElement('div');
        div.className = 'record-stub';
        const fmtId = typeof r.form_id === 'number' ? '0x' + r.form_id.toString(16).toUpperCase().padStart(8, '0') : r.form_id;
        div.textContent = r.editor_id || fmtId || '?';
        div.title = 'FormID: ' + fmtId;
        div.onclick = () => loadRecord(fmtId, div);
        container.appendChild(div);
      }
    });
    currentOffset += children.length;
    const old = container.querySelector('.load-more');
    if (old) old.remove();
    if (children.length === PAGE) {
      const more = document.createElement('div');
      more.className = 'load-more';
      more.textContent = 'Load more…';
      more.onclick = () => appendRecords(container, sig);
      container.appendChild(more);
    }
  } catch(e) {
    container.insertAdjacentHTML('beforeend', '<div class="error" style="padding:4px 12px">' + e.message + '</div>');
  }
}

async function loadRecord(formId, el) {
  document.querySelectorAll('.record-stub.active').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  const info = document.getElementById('record-info');
  const view = document.getElementById('fields-view');
  info.innerHTML = '<span class="spinner">⟳</span> Loading ' + formId + '…';
  view.innerHTML = '';
  try {
    const rec = await api('/records/' + formId);
    info.innerHTML = '<span>' + (rec.editor_id || formId) + '</span> &nbsp; FormID: <span>' + formId + '</span> &nbsp; Type: <span>' + (rec.header && rec.header.signature) + '</span>';
    view.innerHTML = '<pre>' + renderJson(rec.fields, 0) + '</pre>';
  } catch(e) {
    info.innerHTML = '<span class="error">' + formId + '</span>';
    view.innerHTML = '<div class="error">' + e.message + '</div>';
  }
}

function renderJson(val, depth) {
  if (val === null) return '<span class="field-null">null</span>';
  if (typeof val === 'boolean') return '<span class="field-bool">' + val + '</span>';
  if (typeof val === 'number') return '<span class="field-num">' + val + '</span>';
  if (typeof val === 'string') return '<span class="field-str">"' + escHtml(val) + '"</span>';
  if (Array.isArray(val)) {
    if (val.length === 0) return '[]';
    const items = val.map(v => '  '.repeat(depth+1) + renderJson(v, depth+1)).join(',\n');
    return '[\n' + items + '\n' + '  '.repeat(depth) + ']';
  }
  if (typeof val === 'object') {
    const keys = Object.keys(val);
    if (keys.length === 0) return '{}';
    const items = keys.map(k => '  '.repeat(depth+1) + '<span class="field-key">"' + escHtml(k) + '"</span>: ' + renderJson(val[k], depth+1)).join(',\n');
    return '{\n' + items + '\n' + '  '.repeat(depth) + '}';
  }
  return String(val);
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Resizable pane
const handle = document.getElementById('resize-handle');
let dragging = false;
handle.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const lp = document.getElementById('left-pane');
  lp.style.width = Math.max(150, Math.min(600, e.clientX)) + 'px';
});
document.addEventListener('mouseup', () => { dragging = false; });

loadGroups();
</script>
</body>
</html>
