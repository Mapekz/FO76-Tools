name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Rust: fmt / clippy / test ──────────────────────────────────────────────
  #
  # Matrix covers both independent Rust crates.  Each crate has its own
  # rust-toolchain.toml (both currently pin 1.96.0); setup-rust-toolchain reads
  # that file automatically so CI always matches the pinned local toolchain.
  rust:
    name: ${{ matrix.crate }} (fmt / clippy / test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [esm, ba2]
    defaults:
      run:
        working-directory: ${{ matrix.crate }}

    steps:
      - uses: actions/checkout@v7

      # Reads rust-toolchain.toml from $working-directory automatically.
      # rustflags: "" prevents the action from injecting its own -D warnings
      # (we pass that flag explicitly per-step so it shows up in the log).
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: ${{ matrix.crate }}

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      # The esm-server binary has `required-features = ["server"]`, so
      # --all-targets alone silently skips it.  Lint it explicitly.
      - name: clippy (server feature)
        if: matrix.crate == 'esm'
        run: cargo clippy --all-targets --features server -- -D warnings

      - name: test
        run: cargo test
        # Game-data integration tests skip silently when their env vars are unset
        # (no #[ignore] attributes anywhere in esm/src or esm/tests):
        #   tests/decode_coverage.rs  — RUST_TEST_ESM
        #   tests/diff.rs             — RUST_TEST_ESM_A and RUST_TEST_ESM_B

      - name: test (server feature)
        if: matrix.crate == 'esm'
        run: cargo test --features server

      - name: export bindings (generated TypeScript)
        if: matrix.crate == 'esm'
        run: cargo test export_bindings -- --test-threads=1

      - name: check generated TypeScript drift
        if: matrix.crate == 'esm'
        run: git diff --exit-code -- ../esm-viewer/src/shared/generated/

  # ── Python tooling tests ──────────────────────────────────────────────────
  #
  # Hermetic unittest suite (tools/tests/); no pip install or game data required.
  # Structured for follow-up lint/typecheck steps (ruff, ty) in the same job.
  python:
    name: python (tools/tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esm

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          # Matches the .python-version file (3.14.5).
          python-version: "3.14"

      - name: test
        run: python3 -m unittest discover -s tools/tests

  # ── esm-viewer: typecheck + unit tests ───────────────────────────────────
  #
  # No Rust toolchain or native-addon build: index.d.ts is git-tracked and the
  # file:../esm/bindings/napi dependency resolves as a plain symlink.
  esm-viewer:
    name: esm-viewer (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esm-viewer

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: install
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: test
        run: npm run test

  # ── N-API binding: build + smoke ──────────────────────────────────────────
  #
  # Builds the native addon (catches Rust↔JS API drift) and runs the smoke test.
  # Without FO76_ESM set, smoke.mjs exits 0 (SKIP), so no game data is required.
  # continue-on-error while the napi build environment is being stabilised in CI.
  napi:
    name: napi (build + smoke)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: esm/bindings/napi

    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: esm

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: install napi cli
        run: npm ci

      - name: build (debug)
        run: npm run build:debug

      - name: smoke test (skips without FO76_ESM)
        run: npm test

  # ── Schema parity audit ───────────────────────────────────────────────────
  #
  # audit.py --gate checks schema/fo76.json against the Pascal source in
  # TES5Edit.  That source lives outside this repo, so CI clones it as a
  # sibling (extract.py expects it at ../TES5Edit relative to esm/).
  #
  # schema/fo76.json is generated from the Eckserah FO76 fork (not upstream
  # TES5Edit/TES5Edit) which carries detailed FO76 record definitions.  We pin
  # to an exact commit so Pascal drift can't flip this gate without a deliberate
  # bump here paired with a schema regeneration.
  audit:
    name: schema parity audit (esm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          # Matches the .python-version file (3.14.5).
          python-version: "3.14"

      # Clone the Eckserah FO76 fork — the source schema/fo76.json is generated
      # from — as a sibling of esm/ (the path extract.py hard-codes).  Pinned
      # to an exact commit; bump this together with a schema regeneration when
      # updating the Pascal reference.
      - name: fetch TES5Edit (Pascal truth source)
        run: |
          git clone --no-checkout --filter=blob:none https://github.com/Eckserah/TES5Edit.git TES5Edit
          git -C TES5Edit checkout 80a2c3c67e629f46b9320aca54adc706e58ea76c
        working-directory: .

      - name: audit --gate
        working-directory: esm
        run: python3 tools/extractor/audit.py --gate
